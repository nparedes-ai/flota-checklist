<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Check List Vehicular</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--accent:#f97316;--accent-d:#ea580c;--dark:#0f172a;--dark2:#1e293b;--dark3:#334155;--green:#16a34a;--green-b:rgba(22,163,74,.12);--green-brd:rgba(22,163,74,.35);--red:#dc2626;--red-b:rgba(220,38,38,.12);--red-brd:rgba(220,38,38,.35);--amber:#d97706;--amber-b:rgba(217,119,6,.12);--amber-brd:rgba(217,119,6,.35);--text:#f1f5f9;--text2:#94a3b8;--text3:#475569;--card:#0d1929;--card2:#162032;--border:#1e3a5f;--border2:#243d5f;--radius:14px;--radius-sm:9px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--dark);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--dark)}::-webkit-scrollbar-thumb{background:var(--accent);border-radius:4px}
.hdr{background:linear-gradient(135deg,var(--dark) 0%,#1a0a3d 100%);border-bottom:2px solid var(--accent);padding:14px 16px;position:sticky;top:0;z-index:100}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-badge{background:var(--accent);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;padding:5px 10px;border-radius:6px;letter-spacing:1px}
.logo-title{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px}
.logo-sub{font-size:10px;color:var(--text2)}
.nav{display:flex;gap:6px}
.nbtn{padding:7px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--card2);color:var(--text2);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;transition:all .15s}
.nbtn.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.prog-label{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);margin-bottom:3px}
.prog-bar{background:var(--dark3);height:5px;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .35s}
.sec-tabs{display:flex;overflow-x:auto;gap:5px;padding:10px 12px 4px;scrollbar-width:none}
.sec-tabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:6px 12px;border:1px solid var(--border);border-radius:18px;background:var(--card);color:var(--text2);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;white-space:nowrap;transition:all .15s}
.stab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.stab.bad{border-color:var(--red-brd);color:#f87171}
.stab.bad.on{background:var(--red);border-color:var(--red);color:#fff}
.wrap{max-width:680px;margin:0 auto;padding:8px 12px 80px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.card-h{padding:11px 16px;border-bottom:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.card-b{padding:14px 16px}
.sec-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px}
.sec-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;background:var(--card2)}
.sec-icon{font-size:19px}
.sec-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:18px}
.sec-cnt{margin-left:auto;font-size:11px;color:var(--text2);background:var(--dark3);padding:2px 10px;border-radius:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.f{display:flex;flex-direction:column;gap:3px}
.f label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.f input,.f textarea,.f select{border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;font-family:'Barlow',sans-serif;color:var(--text);background:var(--dark2);outline:none;width:100%;transition:border-color .15s}
.f input:focus,.f textarea:focus{border-color:var(--accent)}
.f textarea{resize:none}
.s2{grid-column:1/-1}
.item{padding:13px 16px;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item-name{font-weight:500;font-size:14px;margin-bottom:8px}
.item-row{display:flex;align-items:flex-start;gap:8px}
.sb2{display:grid;grid-template-columns:1fr 1fr;gap:6px;flex:1}
.sb3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;flex:1}
.sbn{border-radius:var(--radius-sm);padding:10px 4px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;border:1px solid;text-align:center;transition:all .12s}
.ok-b{border-color:var(--green-brd);background:var(--green-b);color:#4ade80}
.ok-b.on{background:var(--green);border-color:var(--green);color:#fff}
.bad-b{border-color:var(--red-brd);background:var(--red-b);color:#f87171}
.bad-b.on{background:var(--red);border-color:var(--red);color:#fff}
.warn-b{border-color:var(--amber-brd);background:var(--amber-b);color:#fbbf24}
.warn-b.on{background:var(--amber);border-color:var(--amber);color:#fff}
.ph-btn{width:52px;height:52px;border:1px dashed var(--border2);border-radius:var(--radius-sm);background:var(--card2);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s}
.ph-btn:hover{border-color:var(--accent)}
.ph-thumb{width:52px;height:52px;border-radius:var(--radius-sm);object-fit:cover;border:1px solid var(--border2);cursor:pointer;flex-shrink:0}
.obs-in{width:100%;border:1px solid var(--border2);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;background:var(--dark2);color:var(--text);resize:none;font-family:'Barlow',sans-serif;outline:none;margin-top:7px}
.obs-in:focus{border-color:var(--accent)}
.med-row{display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.med-in{border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px;font-family:'Barlow',sans-serif;color:var(--text);background:var(--dark2);outline:none;min-width:0;flex:1}
.med-in:focus{border-color:var(--accent)}
.rating-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:12px}
.rn{padding:10px 4px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--card2);cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;text-align:center;color:var(--text2);transition:all .15s}
.rn-lo.on{background:var(--red-b);border-color:var(--red-brd);color:#f87171}
.rn-mi.on{background:var(--amber-b);border-color:var(--amber-brd);color:#fbbf24}
.rn-hi.on{background:var(--green-b);border-color:var(--green-brd);color:#4ade80}
.btn{width:100%;padding:15px;border:none;border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;letter-spacing:.5px;cursor:pointer;transition:all .15s;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:disabled{opacity:.5;cursor:default}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-d));color:#fff}
.btn-drive{background:#1a73e8;color:#fff}
.btn-print{background:var(--card2);color:var(--text2);border:1px solid var(--border2)}
.btn-del{background:var(--red-b);color:#f87171;border:1px solid var(--red-brd)}
.drive-ok{background:rgba(26,115,232,.15);border:1px solid rgba(26,115,232,.4);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:10px;font-size:13px}
.drive-ok a{color:#60a5fa;font-weight:600}
.rec{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.rec:hover{border-color:var(--accent)}
.rec-row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.rec-ppu{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px}
.rec-sub{font-size:11px;color:var(--text2);margin-top:2px}
.badge-ok{background:var(--green-b);border:1px solid var(--green-brd);color:#4ade80;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.badge-err{background:var(--red-b);border:1px solid var(--red-brd);color:#f87171;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap}
.alert-box{background:var(--red-b);border:1px solid var(--red-brd);border-radius:var(--radius-sm);padding:11px 14px;font-size:13px;color:#f87171;margin-bottom:12px;font-weight:500}
.det-back{display:flex;align-items:center;gap:8px;padding:10px 0;cursor:pointer;color:var(--accent);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px}
.det-item{display:flex;align-items:flex-start;gap:8px;padding:9px 16px;border-bottom:1px solid var(--border);font-size:13px}
.det-item:last-child{border-bottom:none}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.cfg-note{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.5}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark2);border:1px solid var(--border2);color:var(--text);padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media print{.hdr,.sec-tabs,.btn,#toast{display:none!important}body{background:#fff;color:#000}.card,.sec-card,.rec{background:#fff;border:1px solid #ccc}.wrap{padding:0}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-row">
    <div class="logo">
      <div class="logo-badge">CL</div>
      <div><div class="logo-title">CHECK LIST VEHICULAR</div><div class="logo-sub">Inspección técnica completa</div></div>
    </div>
    <div class="nav">
      <button class="nbtn on" id="n-form" onclick="goPage('form')">+ NUEVO</button>
      <button class="nbtn" id="n-hist" onclick="goPage('hist')">HISTORIAL<span id="hist-cnt"></span></button>
      <button class="nbtn" id="n-cfg" onclick="goPage('cfg')">⚙️</button>
    </div>
  </div>
  <div id="prog-wrap">
    <div class="prog-label"><span id="prog-txt">Progreso</span><span id="prog-pct">0%</span></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</div>
<div id="sec-tabs-wrap"></div>
<div class="wrap" id="content"></div>
<div id="toast"></div>

<script>
const SECS=[
  {id:'luces',e:'💡',n:'Luces',items:[{id:'lbaja',l:'Luz Baja'},{id:'lalta',l:'Luz Alta'},{id:'lfreno',l:'Luz Freno'},{id:'lmarcha',l:'Luz Marcha Atrás'},{id:'neblin',l:'Neblineros'},{id:'interm',l:'Intermitentes / Giro'},{id:'azzard',l:'Luces Azzard / Emergencia'}]},
  {id:'docs',e:'📄',n:'Documentos',items:[{id:'pcirc',l:'Permiso de Circulación'},{id:'soap',l:'SOAP'},{id:'rtech',l:'Revisión Técnica'},{id:'d80',l:'D80'},{id:'inscr',l:'Inscripción'},{id:'liccon',l:'Licencia Conducir (incl. Vencimiento)'}]},
  {id:'neum',e:'🛞',n:'Neumáticos',items:[{id:'ndd',l:'Delantero Derecho'},{id:'ndi',l:'Delantero Izquierdo'},{id:'ntd',l:'Trasero Derecho'},{id:'nti',l:'Trasero Izquierdo'},{id:'nrep',l:'Neumático de Repuesto'}]},
  {id:'acceso',e:'🧰',n:'Accesorios',items:[{id:'botiq',l:'Botiquín'},{id:'chaleco',l:'Chaleco Reflectante'},{id:'cintu',l:'Cinturón de Seguridad'},{id:'extin',l:'Extintor'},{id:'triang',l:'Triángulo de Seguridad'},{id:'plumi',l:'Plumillas'},{id:'llrued',l:'Llave de Rueda'},{id:'gata',l:'Gata'},{id:'chapas',l:'Chapas de Puerta'},{id:'lunizq',l:'Luneta Izquierda'},{id:'lunder',l:'Luneta Derecha'}]},
  {id:'mecan',e:'⚙️',n:'Mecánico',items:[{id:'altern',l:'Alternador'},{id:'bateria',l:'Batería'},{id:'bocina',l:'Bocina'},{id:'azpiloto',l:'Alzavidrio Piloto'},{id:'azcopil',l:'Alzavidrio Copiloto'},{id:'logotip',l:'Logotipo / Carrocería'}]},
  {id:'nivel',e:'💧',n:'Niveles',items:[{id:'refrig',l:'Refrigerante'},{id:'aceite',l:'Aceite Motor'},{id:'atf',l:'ATF (Transmisión)'},{id:'adblue',l:'AdBlue'},{id:'lfren',l:'Líquido de Frenos'},{id:'limpia',l:'Agua Limpiaparabrisas'}]},
  {id:'carroce',e:'🚘',n:'Carrocería',items:[{id:'parabri',l:'Parabrisas (sin grietas)'},{id:'espejos',l:'Espejos Retrovisores'},{id:'golpes',l:'Sin Golpes / Abolladuras'},{id:'pintura',l:'Estado de Pintura'},{id:'faros_f',l:'Faros (estado físico)'},{id:'escape',l:'Sistema de Escape'}]},
  {id:'inter',e:'🪑',n:'Interior',items:[{id:'tapiz',l:'Tapizados / Asientos'},{id:'instrum',l:'Instrumentación / Tablero'},{id:'acca',l:'Aire Acond. / Calefacción'},{id:'gps',l:'GPS / Telemetría'},{id:'limint',l:'Limpieza Interior'},{id:'malete',l:'Maletero / Compartimento'}]},
  {id:'frenos',e:'🛑',n:'Frenos / Susp.',items:[{id:'pedal',l:'Pedal de Freno (sensación)'},{id:'fmano',l:'Freno de Mano'},{id:'abs',l:'Sistema ABS'},{id:'direc',l:'Dirección (sin vibraciones)'},{id:'suspens',l:'Suspensión / Amortiguadores'},{id:'traccion',l:'Tracción'}]},
];
const MED=[{id:'dpf',l:'DPF (Filtro Partículas)'},{id:'volt_alt',l:'Voltaje Alternador (V)'},{id:'pres_dd',l:'Presión Neum. Del. Der. (PSI)'},{id:'pres_di',l:'Presión Neum. Del. Izq. (PSI)'},{id:'pres_td',l:'Presión Neum. Tras. Der. (PSI)'},{id:'pres_ti',l:'Presión Neum. Tras. Izq. (PSI)'}];
const COND=[{id:'pres_veh',l:'Presentación del Vehículo'},{id:'limp_veh',l:'Limpieza del Vehículo'},{id:'pres_cond',l:'Presentación Personal Conductor'},{id:'actitud',l:'Actitud y Comportamiento'}];
const ALL_SECS=[...SECS,{id:'_med',e:'📏',n:'Mediciones'},{id:'_cond',e:'👤',n:'Conductor'},{id:'_cierre',e:'✅',n:'Cierre'}];
const DB='cl-v2';

let page='form',secIdx=0,detail=null;
let info={marca:'',modelo:'',ppu:'',km:'',fecha:today(),conductor:'',mecanico:''};
let ck={};
let nota='',obsGen='';
let records=[],saving=false,driveUrl='';
let scriptUrl=localStorage.getItem('cl-script')||'';
let company=localStorage.getItem('cl-company')||'';

function today(){return new Date().toISOString().slice(0,10);}
function initCk(){ck={};SECS.forEach(s=>{ck[s.id]={};s.items.forEach(it=>{ck[s.id][it.id]={st:null,obs:'',photo:null};});});ck._med={};MED.forEach(m=>{ck._med[m.id]={val:'',est:null,obs:''};});ck._cond={};COND.forEach(c=>{ck._cond[c.id]={st:null};});}
initCk();
function loadRecs(){try{const d=localStorage.getItem(DB);records=d?JSON.parse(d):[];}catch(e){records=[];}}
function saveRecs(){try{localStorage.setItem(DB,JSON.stringify(records));}catch(e){showToast('⚠️ Almacenamiento lleno');}}
function buildFn(ppu,fecha){const d=fecha?new Date(fecha+'T12:00:00'):new Date();const dd=String(d.getDate()).padStart(2,'0');const mm=String(d.getMonth()+1).padStart(2,'0');const yy=String(d.getFullYear()).slice(-2);return(ppu||'sinppu').toLowerCase().replace(/\s+/g,'')+'-'+dd+'-'+mm+'-'+yy;}

function buildDriveData(filename){
  const items=[];
  SECS.forEach(s=>{s.items.forEach(it=>{const c=ck[s.id]?.[it.id];items.push({section:s.n,name:it.l,status:c?.st,obs:c?.obs||'',photo:c?.photo||null});});});
  const mediciones=MED.map(m=>{const c=ck._med?.[m.id];return{label:m.l,valor:c?.val||'',estado:c?.est||null,obs:c?.obs||''};});
  const conductor=COND.map(c=>{const ck2=ck._cond?.[c.id];return{name:c.l,status:ck2?.st};});
  return{type:'cl',filename,info:{...info,conductor:info.conductor},items,mediciones,conductor,nota,obs:obsGen};
}

function totalDone(){let t=0,d=0;SECS.forEach(s=>{s.items.forEach(it=>{t++;if(ck[s.id]?.[it.id]?.st!==null)d++;});});MED.forEach(m=>{t++;if(ck._med?.[m.id]?.est!==null)d++;});COND.forEach(c=>{t++;if(ck._cond?.[c.id]?.st!==null)d++;});return{t,d};}
function hasBad(sid){if(sid)return SECS.find(s=>s.id===sid)?.items.some(it=>ck[sid]?.[it.id]?.st==='m');return SECS.some(s=>s.items.some(it=>ck[s.id]?.[it.id]?.st==='m'));}

function updateProg(){const{t,d}=totalDone();const pct=Math.round(d/t*100);const f=document.getElementById('prog-fill'),p=document.getElementById('prog-pct'),tx=document.getElementById('prog-txt');if(f){f.style.width=pct+'%';f.style.background=pct===100?'#22c55e':'var(--accent)';}if(p)p.textContent=pct+'%';if(tx)tx.textContent=`Progreso — ${d} de ${t}`;const hc=document.getElementById('hist-cnt');if(hc)hc.textContent=records.length?' ('+records.length+')':'';const pw=document.getElementById('prog-wrap');if(pw)pw.style.display=page==='form'?'block':'none';}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function goPage(p){page=p;detail=null;secIdx=0;document.getElementById('n-form').className='nbtn'+(p==='form'?' on':'');document.getElementById('n-hist').className='nbtn'+(p==='hist'?' on':'');document.getElementById('n-cfg').className='nbtn'+(p==='cfg'?' on':'');const stw=document.getElementById('sec-tabs-wrap');stw.style.display=p==='form'?'block':'none';updateProg();renderAll();}
function goSec(i){secIdx=i;renderTabs();renderContent();}

function renderAll(){renderTabs();renderContent();}
function renderTabs(){const stw=document.getElementById('sec-tabs-wrap');if(page!=='form'){stw.innerHTML='';return;}const tabs=ALL_SECS.map((s,i)=>{const isBad=s.id!=='_med'&&s.id!=='_cond'&&s.id!=='_cierre'&&hasBad(s.id);const isOn=secIdx===i;return`<button class="stab${isOn?' on':''}${!isOn&&isBad?' bad':''}" onclick="goSec(${i})">${s.e} ${s.n}</button>`;}).join('');stw.innerHTML=`<div class="sec-tabs">${tabs}</div>`;}

function renderContent(){
  const el=document.getElementById('content');
  if(page==='hist'){el.innerHTML=detail?renderDetail():renderHist();return;}
  if(page==='cfg'){el.innerHTML=renderCfg();return;}
  const sec=ALL_SECS[secIdx];
  let main='';
  if(sec.id==='_med')main=renderMed();
  else if(sec.id==='_cond')main=renderCond();
  else if(sec.id==='_cierre')main=renderCierre();
  else main=renderSec(SECS.find(s=>s.id===sec.id));
  const fn=buildFn(info.ppu||'ppu',info.fecha);
  const driveBtnHtml=scriptUrl?`<button class="btn btn-drive" onclick="saveToDrive()" id="btn-drive">☁️ GUARDAR PDF EN DRIVE (${fn}.pdf)</button>`:`<div style="font-size:11px;color:var(--text3);text-align:center;margin-bottom:8px">Configura Drive en ⚙️ para activar PDF automático</div>`;
  const driveHtml=driveUrl?`<div class="drive-ok">📄 PDF guardado: <a href="${driveUrl}" target="_blank">${fn}.pdf →</a></div>`:'';
  el.innerHTML=`
    ${driveHtml}
    <div class="card" style="margin-bottom:12px">
      <div class="card-h">🚗 DATOS DEL VEHÍCULO</div>
      <div class="card-b">
        <div class="g2">
          ${[['marca','Marca'],['modelo','Modelo'],['ppu','Placa PPU *'],['km','Kilometraje'],['conductor','Conductor'],['mecanico','Mecánico / Inspector']].map(([k,l])=>`<div class="f"><label>${l}</label><input value="${esc(info[k])}" oninput="info['${k}']=this.value${k==='ppu'?';this.value=this.value.toUpperCase()':''}" placeholder="${l}"${k==='ppu'?' style="text-transform:uppercase"':''}></div>`).join('')}
          <div class="f s2"><label>Fecha de Inspección</label><input type="date" value="${info.fecha}" oninput="info.fecha=this.value"></div>
        </div>
      </div>
    </div>
    ${main}
    <button class="btn btn-primary" ${saving?'disabled':''} onclick="guardar()">${saving?'⏳ GUARDANDO...':'💾 GUARDAR CHECK LIST'}</button>
    ${driveBtnHtml}
    <button class="btn btn-print" onclick="window.print()">🖨️ IMPRIMIR / PDF MANUAL</button>
  `;
}

function renderSec(sec){
  if(!sec)return'';
  const done=sec.items.filter(it=>ck[sec.id]?.[it.id]?.st!==null).length;
  const items=sec.items.map(it=>{
    const c=ck[sec.id]?.[it.id]||{st:null,obs:'',photo:null};
    const ph=c.photo?`<img class="ph-thumb" src="${c.photo}" onclick="removePhoto('${sec.id}','${it.id}')" title="Toca para quitar">`:`<button class="ph-btn" onclick="takePhoto('${sec.id}','${it.id}')">📷</button>`;
    const obs=c.st==='m'?`<textarea class="obs-in" rows="2" placeholder="Describe el problema..." onchange="setObs('${sec.id}','${it.id}',this.value)">${esc(c.obs)}</textarea>`:'';
    return`<div class="item">
      <div class="item-name" style="color:${c.st==='m'?'#f87171':c.st==='b'?'#4ade80':'inherit'}">${it.l}${c.photo?` <span style="font-size:10px;color:#60a5fa">📷</span>`:''}</div>
      <div class="item-row">
        <div class="sb2">
          <button class="sbn ok-b${c.st==='b'?' on':''}" onclick="setSt('${sec.id}','${it.id}','b')">✓ BUENO</button>
          <button class="sbn bad-b${c.st==='m'?' on':''}" onclick="setSt('${sec.id}','${it.id}','m')">✗ MALO</button>
        </div>
        ${ph}
      </div>
      ${obs}
    </div>`;
  }).join('');
  return`<div class="sec-card"><div class="sec-hdr"><span class="sec-icon">${sec.e}</span><span class="sec-name">${sec.n}</span><span class="sec-cnt">${done}/${sec.items.length}</span></div>${items}</div>`;
}

function renderMed(){
  const items=MED.map(m=>{const c=ck._med?.[m.id]||{val:'',est:null,obs:''};return`<div class="item"><div class="item-name">${m.l}</div><div class="med-row"><input class="med-in" placeholder="Valor / Medida" value="${esc(c.val)}" oninput="ck._med['${m.id}'].val=this.value;updateProg()"><button class="sbn ok-b${c.est==='ok'?' on':''}" onclick="setMedEst('${m.id}','ok')" style="flex-shrink:0;min-width:65px">✓ OK</button><button class="sbn bad-b${c.est==='rev'?' on':''}" onclick="setMedEst('${m.id}','rev')" style="flex-shrink:0;min-width:80px">⚠ REVISAR</button></div><textarea class="obs-in" rows="1" placeholder="Observación..." onchange="ck._med['${m.id}'].obs=this.value">${esc(c.obs)}</textarea></div>`;}).join('');
  return`<div class="sec-card"><div class="sec-hdr"><span class="sec-icon">📏</span><span class="sec-name">Mediciones</span></div>${items}</div>`;
}

function renderCond(){
  const items=COND.map(c=>{const ckc=ck._cond?.[c.id]||{st:null};return`<div class="item"><div class="item-name">${c.l}</div><div class="sb3"><button class="sbn ok-b${ckc.st==='b'?' on':''}" onclick="setCond('${c.id}','b')">✓ BUENO</button><button class="sbn warn-b${ckc.st==='r'?' on':''}" onclick="setCond('${c.id}','r')">~ REGULAR</button><button class="sbn bad-b${ckc.st==='m'?' on':''}" onclick="setCond('${c.id}','m')">✗ MALO</button></div></div>`;}).join('');
  return`<div class="sec-card"><div class="sec-hdr"><span class="sec-icon">👤</span><span class="sec-name">Evaluación Conductor</span></div>${items}</div>`;
}

function renderCierre(){
  const rns=[1,2,3,4,5,6,7].map(n=>{const cls=n<=3?'rn-lo':n===4?'rn-mi':'rn-hi';return`<button class="rn ${cls}${nota==n?' on':''}" onclick="setNota(${n})">${n}</button>`;}).join('');
  const condSum=COND.map(c=>{const ckc=ck._cond?.[c.id];const d=ckc?.st==='b'?'<span style="color:#4ade80;font-weight:700">✓</span>':ckc?.st==='r'?'<span style="color:#fbbf24;font-weight:700">~</span>':ckc?.st==='m'?'<span style="color:#f87171;font-weight:700">✗</span>':'<span style="color:var(--text3)">—</span>';return`<div class="det-item">${d}<span>${c.l}</span></div>`;}).join('');
  const warnHtml=hasBad()?'<div class="alert-box">⚠️ Se detectaron ítems MALO — revisar antes de circular</div>':'';
  return`
    <div class="sec-card"><div class="sec-hdr"><span class="sec-icon">⭐</span><span class="sec-name">Calificación Cuidado Vehículo</span></div>
      <div class="item"><div style="font-size:11px;color:var(--text2);margin-bottom:10px">Nota 1 a 7 — Si nota ≤ 4, revisar últimos check lists</div>
        <div class="rating-grid">${rns}</div>
        ${nota?`<div style="text-align:center;font-size:13px;color:var(--text2)">Nota: <strong style="font-size:24px;color:${nota<=3?'#f87171':nota<=4?'#fbbf24':'#4ade80'}">${nota}/7</strong>${nota<=4?' — Revisar historial':''}</div>`:''}
      </div>
    </div>
    <div class="sec-card" style="margin-top:8px"><div class="sec-hdr"><span class="sec-icon">📝</span><span class="sec-name">Observación General</span></div>
      <div class="item"><textarea class="obs-in" rows="4" placeholder="Observaciones generales del vehículo..." oninput="obsGen=this.value">${esc(obsGen)}</textarea></div>
    </div>
    <div class="sec-card" style="margin-top:8px"><div class="sec-hdr"><span class="sec-icon">👤</span><span class="sec-name">Resumen Conductor</span></div>${condSum}</div>
    <div class="sec-card" style="margin-top:8px"><div class="sec-hdr"><span class="sec-icon">✍️</span><span class="sec-name">Responsables</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px">
        ${[['MECÁNICO / INSPECTOR',info.mecanico],['CONDUCTOR',info.conductor]].map(([l,v])=>`<div><div style="font-size:10px;color:var(--text3);margin-bottom:4px">${l}</div><div style="background:var(--card2);border-radius:var(--radius-sm);padding:9px 12px;font-size:13px">${esc(v)||'No ingresado'}</div></div>`).join('')}
      </div>
    </div>
    ${warnHtml}`;
}

function renderCfg(){
  return`<div class="wrap" style="padding-top:12px">
    <div class="card"><div class="card-h">☁️ CONEXIÓN GOOGLE DRIVE</div><div class="card-b">
      <div class="f"><label>URL del Apps Script</label>
        <input value="${esc(scriptUrl)}" oninput="scriptUrl=this.value;localStorage.setItem('cl-script',this.value)" placeholder="https://script.google.com/macros/s/...">
        <span class="cfg-note">Pega la URL de tu Apps Script. Los PDFs (con fotos) se guardarán en Drive → carpeta "Checklist Flota".</span>
      </div>
      ${scriptUrl?`<div style="background:var(--green-b);border:1px solid var(--green-brd);border-radius:8px;padding:8px 12px;margin-top:10px;font-size:12px;color:#4ade80;font-weight:600">✓ Drive configurado</div><button class="btn btn-drive" style="margin-top:10px;font-size:14px;padding:11px" onclick="testScript()">🔗 Probar conexión</button>`:''}
    </div></div>
    <div class="card"><div class="card-h">⚙️ GENERAL</div><div class="card-b">
      <div class="f"><label>Empresa / Flota</label><input value="${esc(company)}" oninput="company=this.value;localStorage.setItem('cl-company',this.value)" placeholder="Nombre empresa"></div>
    </div></div>
    <div class="card"><div class="card-h">💾 DATOS</div><div class="card-b" style="font-size:13px;color:var(--text2)">
      <p>${records.length} inspección(es) guardada(s).</p>
      <button class="btn btn-del" style="margin-top:10px;font-size:13px;padding:10px" onclick="clearAll()">🗑️ Borrar historial</button>
    </div></div>
  </div>`;
}

function renderHist(){
  if(!records.length)return`<div class="empty"><div style="font-size:48px;margin-bottom:12px">📭</div><div style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;margin-bottom:6px">Sin inspecciones</div><p style="font-size:13px">Completa tu primera inspección</p></div>`;
  return`<div style="padding-bottom:20px"><div style="font-size:12px;color:var(--text2);margin-bottom:10px;font-family:'Barlow Condensed',sans-serif;font-weight:700">${records.length} INSPECCIÓN${records.length!==1?'ES':''}</div>
  ${records.map(r=>{const d=new Date(r.createdAt);const bad=r.badCount||0;const badge=bad?`<span class="badge-err">⚠ ${bad} malo${bad>1?'s':''}</span>`:`<span class="badge-ok">✓ OK</span>`;return`<div class="rec" onclick="viewDetail('${r.id}')"><div class="rec-row"><div><div class="rec-ppu">${esc(r.info.ppu||'Sin PPU')} — ${esc(r.info.marca)} ${esc(r.info.modelo)}</div><div class="rec-sub">${d.toLocaleDateString('es-CL',{day:'2-digit',month:'long',year:'numeric'})} · ${d.toLocaleTimeString('es-CL',{hour:'2-digit',minute:'2-digit'})}</div>${r.info.conductor?`<div class="rec-sub">👤 ${esc(r.info.conductor)}</div>`:''}${r.info.km?`<div class="rec-sub">📍 ${esc(r.info.km)} km</div>`:''}${r.driveUrl?`<div style="margin-top:4px"><a href="${r.driveUrl}" target="_blank" style="color:#60a5fa;font-size:11px;font-weight:600">📄 ${r.filename||'PDF'}.pdf</a></div>`:''}</div><div style="text-align:right">${badge}${r.nota?`<div style="font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:${r.nota<=3?'#f87171':r.nota<=4?'#fbbf24':'#4ade80'};margin-top:6px">N:${r.nota}</div>`:''}</div></div></div>`;}).join('')}</div>`;
}

function renderDetail(){
  const r=records.find(x=>x.id===detail);if(!r)return renderHist();
  const d=new Date(r.createdAt);
  const secCards=SECS.map(s=>{
    const bad=s.items.filter(it=>r.checks[s.id]?.[it.id]?.st==='m');
    const ok=s.items.filter(it=>r.checks[s.id]?.[it.id]?.st==='b').length;
    const na=s.items.filter(it=>r.checks[s.id]?.[it.id]?.st===null).length;
    const badge=bad.length?`<span class="badge-err">${bad.length} malo${bad.length>1?'s':''}</span>`:na===0?`<span class="badge-ok">OK</span>`:'';
    const allItems=s.items.map(it=>{
      const c=r.checks[s.id]?.[it.id];const st=c?.st;
      const dot=st==='b'?'<span style="color:#4ade80;font-weight:700">✓</span>':st==='m'?'<span style="color:#f87171;font-weight:700">✗</span>':'<span style="color:var(--text3)">—</span>';
      return`<div class="det-item">${dot}<div style="flex:1">${it.l}${c?.obs?`<div style="font-size:11px;color:var(--text2);margin-top:2px">${esc(c.obs)}</div>`:''}${c?.photo?`<br><img src="${c.photo}" style="width:90px;height:68px;object-fit:cover;border-radius:6px;margin-top:6px;border:1px solid var(--border)">`:''}</div></div>`;
    }).join('');
    return`<div class="sec-card"><div class="sec-hdr" style="padding:9px 16px"><span class="sec-icon" style="font-size:15px">${s.e}</span><span class="sec-name" style="font-size:15px">${s.n}</span><span style="margin-left:auto">${badge}</span></div>${allItems}</div>`;
  }).join('');
  return`
    <div class="det-back" onclick="detail=null;render()">← Volver</div>
    <div class="card"><div class="card-h">🚗 ${esc(r.info.ppu||'Sin PPU')} — ${esc(r.info.marca)} ${esc(r.info.modelo)}</div>
      <div class="card-b"><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px">
        ${[['Fecha',d.toLocaleDateString('es-CL')],['KM',r.info.km||'—'],['Conductor',r.info.conductor||'—'],['Mecánico',r.info.mecanico||'—'],['Nota',r.nota?(r.nota+'/7'):'—']].map(([k,v])=>`<div><span style="color:var(--text3)">${k}: </span><strong>${esc(v)}</strong></div>`).join('')}
      </div>
      ${r.driveUrl?`<div style="margin-top:10px"><a href="${r.driveUrl}" target="_blank" style="color:#60a5fa;font-weight:600">☁️ Ver PDF en Drive (con fotos) →</a></div>`:''}
      ${r.obsGen?`<div style="margin-top:10px;font-size:12px;color:var(--text2);border-top:1px solid var(--border);padding-top:8px">📝 ${esc(r.obsGen)}</div>`:''}
    </div></div>
    ${secCards}
    <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir PDF</button>
    <button class="btn btn-del" onclick="deleteRec('${r.id}')">🗑️ Eliminar registro</button>
  `;
}

/* ── ACTIONS ── */
function setSt(sec,id,val){if(!ck[sec])ck[sec]={};if(!ck[sec][id])ck[sec][id]={st:null,obs:'',photo:null};ck[sec][id].st=ck[sec][id].st===val?null:val;if(ck[sec][id].st!=='m')ck[sec][id].obs='';updateProg();renderTabs();renderContent();}
function setObs(sec,id,val){if(ck[sec]&&ck[sec][id])ck[sec][id].obs=val;}
function setMedEst(id,val){if(!ck._med[id])ck._med[id]={val:'',est:null,obs:''};ck._med[id].est=ck._med[id].est===val?null:val;updateProg();renderContent();}
function setCond(id,val){if(!ck._cond[id])ck._cond[id]={st:null};ck._cond[id].st=ck._cond[id].st===val?null:val;updateProg();renderContent();}
function setNota(n){nota=nota==n?'':String(n);renderContent();}

function takePhoto(sec,id){
  const i=document.createElement('input');i.type='file';i.accept='image/*';i.capture='environment';
  i.onchange=e=>{const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const im=new Image();im.onload=()=>{const cv=document.createElement('canvas');const M=700;let w=im.width,h=im.height;if(w>M){h=Math.round(h*M/w);w=M;}if(h>M){w=Math.round(w*M/h);h=M;}cv.width=w;cv.height=h;cv.getContext('2d').drawImage(im,0,0,w,h);if(!ck[sec])ck[sec]={};if(!ck[sec][id])ck[sec][id]={st:null,obs:'',photo:null};ck[sec][id].photo=cv.toDataURL('image/jpeg',.58);renderContent();};im.src=ev.target.result;};r.readAsDataURL(f);};i.click();
}
function removePhoto(sec,id){if(ck[sec]&&ck[sec][id])ck[sec][id].photo=null;renderContent();}

async function guardar(){
  if(!info.ppu.trim()){showToast('⚠️ Ingrese la Placa PPU');return;}
  saving=true;renderContent();
  const badCount=SECS.reduce((a,s)=>a+s.items.filter(it=>ck[s.id]?.[it.id]?.st==='m').length,0);
  const fn=buildFn(info.ppu,info.fecha);
  const rec={id:Date.now().toString(),createdAt:new Date().toISOString(),filename:fn,info:{...info},checks:JSON.parse(JSON.stringify(ck)),nota,obsGen,badCount,driveUrl:''};
  records.unshift(rec);saveRecs();
  showToast('✅ Check List guardado — '+fn);
  if(scriptUrl){saveDriveRecord(rec);}
  initCk();nota='';obsGen='';secIdx=0;driveUrl='';
  info={marca:'',modelo:'',ppu:'',km:'',fecha:today(),conductor:info.conductor,mecanico:info.mecanico};
  saving=false;updateProg();renderAll();
}

async function saveDriveRecord(rec){
  try{
    const data=buildDriveData(rec.filename);
    const res=await fetch(scriptUrl,{method:'POST',body:JSON.stringify(data)});
    const j=await res.json();
    if(j.ok){rec.driveUrl=j.url;const idx=records.findIndex(r=>r.id===rec.id);if(idx>=0)records[idx]=rec;saveRecs();showToast('☁️ PDF con fotos en Drive: '+rec.filename+'.pdf');renderAll();}
  }catch(e){console.error('Drive:',e);}
}

async function saveToDrive(){
  if(!scriptUrl){showToast('⚠️ Configura Drive en ⚙️');return;}
  if(!info.ppu.trim()){showToast('⚠️ Ingresa la Placa PPU');return;}
  const btn=document.getElementById('btn-drive');if(btn){btn.disabled=true;btn.textContent='⏳ Generando PDF con fotos...';}
  try{
    const fn=buildFn(info.ppu,info.fecha);
    const data=buildDriveData(fn);
    const res=await fetch(scriptUrl,{method:'POST',body:JSON.stringify(data)});
    const j=await res.json();
    if(j.ok){driveUrl=j.url;showToast('☁️ PDF guardado: '+fn+'.pdf');}
    else{showToast('Error: '+(j.error||'desconocido'));}
  }catch(e){showToast('Error de conexión con Drive');}
  if(btn){btn.disabled=false;}
  renderContent();
}

async function testScript(){showToast('Probando...');try{const res=await fetch(scriptUrl);const j=await res.json();showToast(j.ok?'✅ Conexión OK — Drive activo':'❌ Error: '+j.error);}catch(e){showToast('❌ No se pudo conectar');}}
function viewDetail(id){detail=id;renderContent();}
function deleteRec(id){if(!confirm('¿Eliminar?'))return;records=records.filter(r=>r.id!==id);saveRecs();detail=null;renderContent();}
function clearAll(){if(!confirm('¿Borrar TODO el historial?'))return;records=[];saveRecs();renderContent();showToast('Historial borrado');}
function render(){renderAll();}

loadRecs();
document.getElementById('sec-tabs-wrap').style.display='block';
goPage('form');
</script>
</body>
</html>
